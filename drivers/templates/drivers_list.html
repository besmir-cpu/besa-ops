<!DOCTYPE html>
<html>
<head>
    <title>Drivers</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .search-box {
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background: #2f80ed;
            color: white;
        }

        tr:hover {
            background: #f1f3f5;
        }

        a {
            text-decoration: none;
            color: #2f80ed;
        }

        .status {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
        }

        .invited { background: #ffeaa7; }
        .submitted { background: #81ecec; }
        .active { background: #55efc4; }
    </style>
</head>

<body>

<h1>Drivers</h1>

<form method="GET" class="search-box">
    <input type="text" name="q" placeholder="Search drivers..." value="{{ query }}">
    <button type="submit">Search</button>
</form>

<table>
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Status</th>
    </tr>

    {% for driver in drivers %}
    <tr>
        <td>
            <a href="/drivers/{{ driver.id }}/">
                {{ driver.first_name }} {{ driver.last_name }}
            </a>
        </td>
        <td>{{ driver.phone }}</td>
        <td>
            <span class="status {{ driver.status }}">
                {{ driver.status }}
            </span>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
