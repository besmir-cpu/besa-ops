<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin: 0;
            font-size: 28px;
        }

        .card p {
            margin: 5px 0 0;
            color: grey;
        }

        .actions {
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            margin-right: 10px;
            background: #2f80ed;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn:hover {
            background: #1c60c7;
        }
    </style>
</head>

<body>

<h1>Driver Management Dashboard</h1>

<div class="cards">
    <div class="card">
        <h2>{{ total_drivers }}</h2>
        <p>Total Drivers</p>
    </div>

    <div class="card">
        <h2>{{ invited_count }}</h2>
        <p>Invited</p>
    </div>

    <div class="card">
        <h2>{{ submitted_count }}</h2>
        <p>Submitted</p>
    </div>

    <div class="card">
        <h2>{{ active_count }}</h2>
        <p>Active</p>
    </div>
</div>

<div class="actions">
    <a class="btn" href="/invite-driver/">Invite Driver</a>
    <a class="btn" href="/drivers/">View Drivers</a>
</div>

</body>
</html>
